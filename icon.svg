<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="url(#bg)"/>
  
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="50" fill="none" stroke="#0f3460" stroke-width="4"/>
  
  <!-- Inner design - Abstract hunter symbol -->
  <path d="M64 24 L84 44 L84 84 L64 104 L44 84 L44 44 Z" 
        fill="none" stroke="url(#accent)" stroke-width="3"/>
  
  <!-- Central void/eye -->
  <circle cx="64" cy="64" r="12" fill="url(#accent)"/>
  
  <!-- Crosshair lines -->
  <line x1="64" y1="14" x2="64" y2="34" stroke="#e94560" stroke-width="2"/>
  <line x1="64" y1="94" x2="64" y2="114" stroke="#e94560" stroke-width="2"/>
  <line x1="14" y1="64" x2="34" y2="64" stroke="#e94560" stroke-width="2"/>
  <line x1="94" y1="64" x2="114" y2="64" stroke="#e94560" stroke-width="2"/>
  
  <!-- Corner accents -->
  <circle cx="24" cy="24" r="3" fill="#e94560" opacity="0.6"/>
  <circle cx="104" cy="24" r="3" fill="#e94560" opacity="0.6"/>
  <circle cx="24" cy="104" r="3" fill="#e94560" opacity="0.6"/>
  <circle cx="104" cy="104" r="3" fill="#e94560" opacity="0.6"/>
</svg>
